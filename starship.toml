# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Append a newline at the start of the prompt
add_newline = true

# Use custom symbols
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold magenta"

[git_status]
disabled = false
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "
